<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Erica Website</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f5f0;
      color: #1d1b18;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(214, 184, 122, 0.34), transparent 34rem),
        linear-gradient(135deg, #fffaf0 0%, #f2ede3 100%);
    }
    main {
      width: min(920px, 100%);
      padding: clamp(32px, 6vw, 72px);
      border: 1px solid rgba(40, 35, 28, 0.12);
      border-radius: 32px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 24px 80px rgba(80, 60, 34, 0.12);
      backdrop-filter: blur(18px);
    }
    .eyebrow {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
      color: #8b6f3f;
      margin-bottom: 24px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 0.92;
      margin: 0;
      letter-spacing: -0.06em;
    }
    p {
      max-width: 640px;
      margin: 28px 0 0;
      font-size: clamp(1.08rem, 2vw, 1.35rem);
      line-height: 1.65;
      color: #51483c;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      padding: 12px 16px;
      border-radius: 999px;
      background: #1d1b18;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #77d17a;
      box-shadow: 0 0 0 6px rgba(119, 209, 122, 0.18);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Coming Soon</div>
    <h1>Erica<br />Website</h1>
    <p>This placeholder site is live and ready for the next iteration. Content, branding, and pages can be added here as the project takes shape.</p>
    <div class="status"><span class="dot"></span> Deployed with Vercel</div>
  </main>
</body>
</html>
